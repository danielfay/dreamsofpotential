name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Vet, Test, Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Ebiten uses CGO on Linux and links against these at build time.
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgl1-mesa-dev libxi-dev libxcursor-dev \
            libxrandr-dev libxinerama-dev libxxf86vm-dev

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
